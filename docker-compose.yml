version: '3.8'

services:
  backend:
    build: ./backend
    container_name: studio-backend
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:////app/database/studio.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: studio-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
